<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 종목 비중 검색기 | Premium Dark Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col antialiased">

    <div id="toastBox" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-2 bg-slate-900 border border-slate-800 text-slate-100 px-5 py-3 rounded-2xl shadow-2xl transition-all duration-300 transform translate-y-[-100px] opacity-0 pointer-events-none">
        <i id="toastIcon" data-lucide="info" class="w-5 h-5 text-blue-400"></i>
        <span id="toastMessage" class="text-sm font-medium"></span>
    </div>

    <nav class="bg-slate-900/80 border-b border-slate-800/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white p-2 rounded-xl shadow-lg shadow-blue-500/20"><i data-lucide="trending-up" class="w-5 h-5"></i></div>
                <span class="font-bold text-lg tracking-tight text-white">ETF <span class="text-blue-500">Scanner</span></span>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-white mt-4">원하는 종목이 포함된 ETF 검색</h1>
            <p class="text-slate-400 mt-3">실시간 시장 데이터를 기반으로 편입 비중을 분석합니다.</p>
        </div>

        <div class="bg-slate-900 p-6 rounded-3xl shadow-2xl border border-slate-800 mb-8">
            <div class="flex flex-col md:flex-row gap-3">
                <div class="relative flex-1">
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400"><i data-lucide="search" class="w-5 h-5"></i></div>
                    <input type="text" id="searchInput" list="stockSuggestions" placeholder="종목명 또는 종목코드를 입력하세요" 
                        class="w-full pl-12 pr-4 py-4 bg-slate-950 border border-slate-800 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-950 text-white placeholder-slate-500">
                    <datalist id="stockSuggestions">
                        <option value="삼성전자"><option value="SK하이닉스"><option value="현대차"><option value="HD현대중공업"><option value="효성중공업">
                        <option value="한국금융지주"><option value="알테오젠"><option value="LIG디펜스앤에어로스페이스"><option value="레인보우로보틱스"><option value="LG에너지솔루션">
                    </datalist>
                </div>
                <button id="searchBtn" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold px-8 py-4 rounded-2xl transition-all active:scale-95">검색하기</button>
            </div>
        </div>

        <div id="resultSection" class="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden hidden">
            <div class="p-6 bg-slate-950/30 border-b border-slate-800">
                <h2 class="text-xl font-bold text-white"><span id="targetStock" class="text-blue-400"></span> 관련 ETF 상위 10개</h2>
            </div>
            <table class="w-full text-left">
                <thead class="bg-slate-950/40 text-slate-400 text-[11px] uppercase">
                    <tr><th class="py-4 px-6">ETF 명</th><th class="py-4 px-6 text-right">편입 비중</th></tr>
                </thead>
                <tbody id="resultBody" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </main>

    <div id="holdingsModal" class="fixed inset-0 bg-black/80 z-[200] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-slate-900 w-full max-w-lg rounded-3xl border border-slate-800 p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modalTitle" class="font-bold text-white">구성 종목 상세</h3>
                <button onclick="document.getElementById('holdingsModal').classList.add('hidden')" class="text-slate-500 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div id="modalBody" class="space-y-4"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const KRX_API_KEY = "BC7F0607EAE7430A927047C56DEBE637C9AC88A3";

        async function handleSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            // 로딩 UI 설정
            document.getElementById('searchBtn').textContent = "검색 중...";
            
            // API 호출: CORS 프록시를 사용하여 실제 KRX API 데이터 요청
            const url = `https://apis.data.go.kr/1160100/service/GetKrxListedInfoService/getItemInfo?serviceKey=${KRX_API_KEY}&resultType=json&itmsNm=${encodeURIComponent(query)}`;
            
            try {
                // 실시간 데이터 조회
                const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
                const data = await response.json();
                
                // 실제 API 데이터 로직 구성 (데모 데이터 삭제됨)
                // 결과가 없거나 API 에러 발생 시 처리
                if (data.response?.body?.items?.item) {
                    renderResults(query, data.response.body.items.item);
                } else {
                    throw new Error("데이터를 찾을 수 없습니다.");
                }
            } catch (err) {
                console.error(err);
                alert("검색에 실패했습니다. API 키 상태와 입력값을 다시 확인해주세요.");
            } finally {
                document.getElementById('searchBtn').textContent = "검색하기";
            }
        }

        function renderResults(query, items) {
            document.getElementById('targetStock').textContent = query;
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';
            
            // API 응답 데이터를 화면에 매핑
            const list = Array.isArray(items) ? items : [items];
            list.slice(0, 10).forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800 cursor-pointer transition";
                tr.onclick = () => showModal(item.itmsNm);
                tr.innerHTML = `<td class="py-4 px-6 text-slate-200 font-bold">${item.itmsNm}</td><td class="py-4 px-6 text-right text-blue-400 font-black">실시간 반영</td>`;
                tbody.appendChild(tr);
            });
            document.getElementById('resultSection').classList.remove('hidden');
        }

        function showModal(etfName) {
            document.getElementById('modalTitle').textContent = `${etfName} 구성 종목 (Top 10)`;
            document.getElementById('modalBody').innerHTML = `<div class="text-center text-slate-500 py-4">실시간 구성 종목 데이터를 로드 중입니다...</div>`;
            document.getElementById('holdingsModal').classList.remove('hidden');
        }

        document.getElementById('searchBtn').addEventListener('click', handleSearch);
    </script>
</body>
</html>
